  db:
    image: mysql:8
    container_name: db
    command: --sql-mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
    depends_on:
      - backup
    env_file:
      - .env
    ports:
      - 127.0.0.1:3306:3306
    volumes:
      - ./db/data:/var/lib/mysql
      - ./db/conf.d:/etc/mysql/conf.d
      - ./db/dumps:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks: [nitro]
    logging: *logsettings

  backup:
    image: tiredofit/db-backup:4.0.19
    container_name: backup
    volumes:
      - ./db/backup:/backup
    environment:
      - TIMEZONE=UTC
      - CONTAINER_ENABLE_MONITORING=FALSE
      - DEFAULT_LOG_LEVEL=WARN

      - DEFAULT_CREATE_LATEST_SYMLINK=FALSE
      - BACKUP_JOB_CONCURRENCY=1
      - DEFAULT_CHECKSUM=SHA1
      - DEFAULT_COMPRESSION=GZ
      - DEFAULT_BACKUP_INTERVAL=1440
      - DEFAULT_BACKUP_BEGIN=0315
      - DEFAULT_CLEANUP_TIME=10080

      - DB01_TYPE=mysql
      - DB01_HOST=db
      - DB01_NAME=$MYSQL_USER
      - DB01_USER=$MYSQL_USER
      - DB01_PASS=$MYSQL_PASSWORD
      - DB01_NAME=$MYSQL_DATABASE
    restart: unless-stopped
    networks: [nitro]
    logging: *logsettings

  assets:
    image: nginx:alpine
    container_name: assets
    restart: unless-stopped
    depends_on:
      - imager
      - imgproxy
    env_file:
      - .env
    ports:
      - 127.0.0.1:8080:80
    volumes:
      - ./assets/nginx:/etc/nginx/conf.d/
      - ./assets/:/usr/share/nginx/html
    networks: [nitro]
    logging: *logsettings

networks:
  nitro:
    external: true
