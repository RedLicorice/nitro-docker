x-logging: &logsettings
  driver: "json-file"
  options:
    max-size: "10m"      # ✅ 10MB per file
    max-file: "3"        # 3 file rotazione = 30MB totali
    compress: "true"     # Compressione .gz

services:
  arcturus:
    image: arcturus-server
    container_name: arcturus
    build:
      context: arcturus
    env_file:
      - .env
    volumes:
      - ./assets/:/app/assets/
    ports:
      #- 3000:3000 # gameport
      #- 3001:3001 # rcon
      - 127.0.0.1:2096:2096 # websocket port
    depends_on:
      - db
    restart: unless-stopped
    networks: [nitro]
    logging: *logsettings

  nitro:
    image: nitro-client
    container_name: nitro
    build:
      context: nitro
    env_file:
      - .env
    volumes:
      - ./nitro/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nitro/renderer-config.json:/usr/share/nginx/html/renderer-config.json
      - ./nitro/ui-config.json:/usr/share/nginx/html/ui-config.json
    ports:
      - 127.0.0.1:3000:80
    restart: unless-stopped
    networks: [nitro]
    logging: *logsettings

  imager:
    image: nitro-imager
    container_name: imager
    build:
      context: imager
    env_file:
      - .env
    volumes:
      - ./assets/:/app/assets/
    restart: unless-stopped
    networks: [nitro]
    logging: *logsettings

  imgproxy:
    image: ghcr.io/willnorris/imageproxy
    container_name: imgproxy
    volumes:
      - "./assets/usercontent/imageproxy/cache:/tmp/imageproxy"
    env_file:
      - .env
    restart: unless-stopped
    networks: [nitro]
    logging: *logsettings

  cms:
    image: atomcms
    container_name: atomcms
    build:
      context: atomcms
    depends_on:
      - assets
      - arcturus
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - "./.cms.env:/var/www/html/.env"
      - "./atomcms/storage:/var/www/html/storage/app/public"
      - "./atomcms/logs:/var/www/html/storage/logs"
      - "./atomcms/gamedata:/var/www/html/public/gamedata"
    restart: unless-stopped
    networks: [nitro]
    logging: *logsettings
  
